<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>三国杀·谋定天下 海报</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 768px;
            height: 1152px;
            overflow: hidden;
        }

        body {
            background-color: #1A1100;
            font-family: 'Noto Sans SC', sans-serif;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .poster {
            position: relative;
            width: 768px;
            height: 1152px;
            overflow: hidden;
            background-color: #1A1100;
        }

        /* 背景纹理层：带有火焰效果的斜向渐变 */
        #background-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(145deg, rgba(196, 30, 58, 0.08) 0%, transparent 40%),
                linear-gradient(225deg, rgba(212, 165, 67, 0.05) 0%, transparent 50%),
                repeating-linear-gradient(-45deg,
                    transparent,
                    transparent 60px,
                    rgba(196, 30, 58, 0.02) 60px,
                    rgba(196, 30, 58, 0.02) 61px);
            pointer-events: none;
            z-index: 0;
        }

        /* 对角能量分割线 - 从左上到右下的半透明红色带状 */
        #diagonal-stripe {
            position: absolute;
            top: -150px;
            left: -200px;
            width: 900px;
            height: 500px;
            background: linear-gradient(135deg, transparent 0%, rgba(196, 30, 58, 0.15) 40%, rgba(196, 30, 58, 0.20) 60%, transparent 100%);
            transform: rotate(25deg);
            transform-origin: top left;
            pointer-events: none;
            z-index: 1;
        }

        /* 主视觉 - 武将三角插图 */
        #key-visual {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60%;
            height: 78%;
            overflow: hidden;
            z-index: 2;
            clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
            /* 左侧斜切，形成对角方向 */
            mix-blend-mode: luminosity;
            opacity: 0.35;
            /* 半透明降低对比，让文字更突出，同时保留英雄气势 */
        }

        #key-visual img {
            display: block;
            width: 110%;
            height: 100%;
            object-fit: cover;
            object-position: 30% 20%;
            /* 聚焦于主要人物 */
        }

        /* 给主图增加一点暖色叠加 */
        #key-visual::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 165, 67, 0.25) 0%, rgba(196, 30, 58, 0.35) 100%);
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        /* 底层主视觉的第二个副本，用于更强烈的色彩表达 */
        #key-visual-strong {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 55%;
            height: 72%;
            overflow: hidden;
            z-index: 1;
            clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%);
        }

        #key-visual-strong img {
            display: block;
            width: 115%;
            height: 100%;
            object-fit: cover;
            object-position: 25% 15%;
        }

        #key-visual-strong::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(196, 30, 58, 0.30) 0%, rgba(26, 17, 0, 0.60) 100%);
            pointer-events: none;
        }

        /* 装饰纹理 - 卡牌边框纹样，放在底部区域 */
        #decorative-pattern {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            z-index: 5;
            background-image: url('/assets/generated_illustrations/a26a379aef2e4af5bdf2a20f46a230c9_decorative_pattern_db1dd96e.png');
            background-size: 200px 120px;
            background-repeat: repeat-x;
            background-position: bottom center;
            opacity: 0.25;
            pointer-events: none;
        }

        /* 底部还有一个较暗的渐变过渡，让纹理融合 */
        #bottom-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, #1A1100 0%, transparent 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* 文字容器 - 在主视觉未覆盖的左上区 */
        #text-block {
            position: absolute;
            top: 80px;
            left: 50px;
            max-width: 500px;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        #headline {
            font-family: 'Noto Serif SC', serif;
            font-weight: 700;
            font-size: 58px;
            line-height: 1.2;
            color: #D4A543;
            text-shadow: 0 2px 20px rgba(212, 165, 67, 0.3);
            letter-spacing: 8px;
            margin-bottom: 20px;
            transform: rotate(-2deg);
            /* 微观对角线倾向 */
        }

        #headline::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: #C41E3A;
            margin-top: 10px;
            margin-left: 4px;
        }

        #subhead {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: #F5E6C8;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        #body {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 400;
            font-size: 15px;
            color: #F5E6C8;
            line-height: 1.7;
            max-width: 380px;
            opacity: 0.85;
            text-shadow: 0 1px 8px rgba(0,0,0,0.9);
            margin-bottom: 40px;
        }

        #cta {
            display: inline-block;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 700;
            font-size: 18px;
            color: #F5E6C8;
            background: transparent;
            border: 2px solid #C41E3A;
            padding: 12px 36px;
            letter-spacing: 4px;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(196, 30, 58, 0.3);
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.15);
            transition: none;
            align-self: flex-start;
        }

        /* 额外装饰：右上角的金色斜线 */
        #accent-line {
            position: absolute;
            top: 60px;
            right: 40px;
            width: 200px;
            height: 2px;
            background: #D4A543;
            transform: rotate(35deg);
            z-index: 6;
            opacity: 0.4;
            pointer-events: none;
        }

        #accent-line-2 {
            position: absolute;
            top: 90px;
            right: 80px;
            width: 120px;
            height: 1px;
            background: #C41E3A;
            transform: rotate(-20deg);
            z-index: 6;
            opacity: 0.3;
            pointer-events: none;
        }

        /* 一些粒子/烟雾效果的模拟（纯CSS圆点） */
        .dust {
            position: absolute;
            border-radius: 50%;
            background: rgba(212, 165, 67, 0.08);
            pointer-events: none;
            z-index: 0;
        }
        .dust1 { width: 180px; height: 180px; top: 200px; right: 100px; }
        .dust2 { width: 300px; height: 300px; bottom: 250px; left: -50px; background: rgba(196, 30, 58, 0.04); }
        .dust3 { width: 120px; height: 120px; top: 500px; left: 400px; background: rgba(212, 165, 67, 0.06); }

    </style>
<style id="postai-canvas-guard">
  html, body {
    width: 768px !important;
    min-width: 768px !important;
    max-width: 768px !important;
    height: 1152px !important;
    min-height: 1152px !important;
    max-height: 1152px !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden !important;
    transform: none !important;
    transform-origin: top left !important;
  }
  body {
    position: relative !important;
  }
</style>
</head>
<body>
    <div class="poster">

        <!-- 背景纹理 -->
        <div id="background-texture"></div>
        <div class="dust dust1"></div>
        <div class="dust dust2"></div>
        <div class="dust dust3"></div>

        <!-- 对角线能量带 -->
        <div id="diagonal-stripe"></div>

        <!-- 主视觉（半透明叠层） -->
        <div id="key-visual" data-role="illustration">
            <img src="/assets/generated_illustrations/a26a379aef2e4af5bdf2a20f46a230c9_main_visual_67fab1e2.png" alt="三国杀武将关羽、诸葛亮、曹操">
        </div>

        <!-- 主视觉（更强的不透明版本） -->
        <div id="key-visual-strong" data-role="illustration-backup" aria-hidden="true">
            <img src="/assets/generated_illustrations/a26a379aef2e4af5bdf2a20f46a230c9_main_visual_67fab1e2.png" alt="">
        </div>

        <!-- 底部渐变过渡 -->
        <div id="bottom-gradient"></div>

        <!-- 装饰纹理 -->
        <div id="decorative-pattern" data-role="pattern"></div>

        <!-- 装饰线条 -->
        <div id="accent-line"></div>
        <div id="accent-line-2"></div>

        <!-- 文字内容 -->
        <div id="text-block">
            <div id="headline" data-role="headline">三国杀·谋定天下</div>
            <div id="subhead" data-role="subhead">经典武将，策略对决，等你来战</div>
            <div id="body" data-role="body">身份局、国战、1v1……多种模式自由切换，百名武将任你指挥。</div>
            <div id="cta" data-role="cta">立即下载 决胜三国</div>
        </div>

    </div>
</body>
</html>
