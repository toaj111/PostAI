<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PostAI Demo Frontend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <main class="shell">
      <header class="hero reveal">
        <p class="eyebrow">POSTAI DEMO</p>
        <h1>智能海报生成演示台</h1>
        <p class="subtitle">
          一页完成输入、生成、流式观测与结果预览，入口清晰，方便联调。
        </p>
      </header>

      <section class="panel reveal delay-1">
        <div class="panel-head">
          <h2>功能入口</h2>
          <span class="status-dot" id="serverDot" title="服务状态"></span>
        </div>

        <div class="entry-grid">
          <button id="healthBtn" class="entry-card">
            <strong>健康检查</strong>
            <span>GET /health</span>
          </button>
          <button id="generateBtn" class="entry-card entry-card-primary">
            <strong>快速生成</strong>
            <span>POST /api/v1/generate</span>
          </button>
          <button id="streamBtn" class="entry-card">
            <strong>流式生成</strong>
            <span>POST /api/v1/generate/stream</span>
          </button>
        </div>
      </section>

      <section class="workspace reveal delay-2">
        <form id="requestForm" class="card form-card">
          <h3>生成参数</h3>

          <label class="field">
            <span>主题 Prompt</span>
            <textarea
              id="prompt"
              rows="4"
              placeholder="例如：制作一张科技风 AI 会议海报"
            >
制作一张科技风 AI 会议海报</textarea
            >
          </label>

          <div class="field-row">
            <label class="field">
              <span>宽度</span>
              <input
                id="width"
                type="number"
                min="256"
                max="4096"
                value="768"
              />
            </label>
            <label class="field">
              <span>高度</span>
              <input
                id="height"
                type="number"
                min="256"
                max="4096"
                value="1152"
              />
            </label>
          </div>

          <div class="field-row">
            <label class="field">
              <span>最大迭代</span>
              <input
                id="maxIterations"
                type="number"
                min="1"
                max="5"
                value="2"
              />
            </label>
            <label class="field">
              <span>目标分数</span>
              <input
                id="targetScore"
                type="number"
                min="1"
                max="100"
                value="85"
              />
            </label>
          </div>
        </form>

        <section class="card output-card">
          <div class="output-head">
            <h3>输出面板</h3>
            <span id="runningTag" class="tag">Idle</span>
          </div>

          <div class="preview-box" id="previewBox">
            <p class="preview-placeholder">
              暂无海报结果，点击“快速生成”或“流式生成”开始。
            </p>
          </div>

          <pre id="logArea" class="log" aria-live="polite"></pre>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
